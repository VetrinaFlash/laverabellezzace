<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vera Bellezza - Caserta</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-blue: #005bb5; 
            --brand-yellow: #ffde00; 
            --bg-light: #ffffff; 
            --text-dark: #1a1a1a;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--brand-blue); color: #ffffff; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;}

        /* SEZIONE HERO CON SFONDO MAIOLICA CONTINUO */
        .hero-section {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center; position: relative; padding: 20px;
            /* Nuova texture maiolica continua */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80"><g fill="%23fff" fill-opacity="0.1"><path d="M50 40c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10-10-4.477-10-10zM10 10c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10-10-4.477-10-10zM30 50c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10-10-4.477-10-10zM70 70c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10-10-4.477-10-10zM30 10c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10-10-4.477-10-10zM10 30c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10-10-4.477-10-10zM50 70c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10-10-4.477-10-10zM70 50c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10-10-4.477-10-10z"/></g></svg>');
            background-color: #f4f4f4; /* Colore di base chiaro */
        }

        /* EMBLEMA MAIOLICA CENTRALE CON LOGO */
        .logo-emblem {
            position: relative; z-index: 1; display: flex; align-items: center; justify-content: center;
            width: 280px; height: 280px; background-color: var(--bg-light); border-radius: 50%;
            border: 12px solid var(--brand-yellow); margin-bottom: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60"><g fill="%23005bb5" fill-opacity="0.1"><path d="M30 0l15 15-15 15L15 15z" /><path d="M0 30l15-15 15 15-15 15z" /><path d="M30 60l-15-15 15-15 15 15z" /><path d="M60 30l-15 15-15-15 15-15z" /></g></svg>');
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(2deg); } 100% { transform: translateY(0px) rotate(0deg); } }

        .logo-img { max-width: 200px; height: auto; }

        h1 { font-family: 'Montserrat', sans-serif; font-size: 2.8rem; font-weight: 900; color: var(--brand-blue); margin-bottom: 10px; text-transform: uppercase; line-height: 1; }
        h2 { font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 400; color: var(--brand-blue); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8;}

        /* PULSANTE D'AZIONE */
        .btn-main { background: var(--brand-yellow); color: var(--brand-blue); border: none; padding: 22px 50px; border-radius: 50px; font-weight: 900; font-size: 1.4rem; text-transform: uppercase; display: inline-flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; text-decoration: none; box-shadow: 0 10px 25px rgba(255, 222, 0, 0.4); font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; animation: pulse-btn 2.5s infinite; }
        .btn-main:active { transform: scale(0.95); }
        @keyframes pulse-btn { 0% { box-shadow: 0 0 0 0 rgba(255, 222, 0, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 222, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 222, 0, 0); } }

        /* FOOTER */
        footer { background: var(--brand-blue); color: #ffffff; padding: 30px 20px; text-align: center; border-top: 6px solid var(--brand-yellow); font-family: 'Poppins', sans-serif; }
        .footer-logo { max-width: 140px; margin-bottom: 20px; }
        .info-line { font-size: 0.9rem; margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .info-line i { color: var(--brand-yellow); }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="logo-emblem">
            <img src="images/logo.png" alt="La Vera Bellezza" class="logo-img">
        </div>
        
        <h1>La Vera Bellezza</h1>
        <h2>Trattoria e Pizzeria Napoletana</h2>

        <a href="menu.html" class="btn-main">
            <i class="fa-solid fa-list-check"></i> Sfoglia il Menù
        </a>
    </div>

    <footer>
        <img src="images/logo.png" alt="La Vera Bellezza" class="footer-logo">
        <div class="info-line"><i class="fa-solid fa-location-dot"></i> Via Gennaro Tescione 164, Caserta 81100</div>
        <div class="social-row">
            <a href="https://wa.me/393389743948" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/laverabellezza_ce/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </footer>

</body>
</html>
