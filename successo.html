<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ordine Confermato - La Vera Bellezza</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        /* Tema Blu Elettrico dal volantino */
        body { background-color: #005bb5; color: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
        
        .card { background: #ffffff; padding: 40px 25px; border-radius: 24px; border-bottom: 8px solid #ffde00; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 400px; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Inserimento Logo anche qui */
        .logo-img { max-width: 180px; height: auto; margin: 0 auto 20px; display: block; }
        
        .icon-circle { width: 80px; height: 80px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; border: 3px solid #4CAF50; }
        .icon-circle i { font-size: 2.5rem; color: #4CAF50; }
        
        h1 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; color: #005bb5; margin-bottom: 15px; font-weight: 900; line-height: 1.2; text-transform: uppercase;}
        p { font-size: 1rem; color: #555; margin-bottom: 30px; line-height: 1.6; }
        .highlight { color: #005bb5; font-weight: 800; }
        
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 18px 20px; border-radius: 50px; font-size: 1.1rem; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; text-decoration: none; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4); font-family: 'Montserrat', sans-serif; text-transform: uppercase; transition: transform 0.2s; animation: pulse 2s infinite; }
        .btn-whatsapp:active { transform: scale(0.96); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }
    </style>
</head>
<body>

    <div class="card">
        <img src="images/logo.png" alt="La Vera Bellezza" class="logo-img">
        <div class="icon-circle">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1>Pagamento Riuscito!</h1>
        <p>Il tuo ordine è stato saldato con successo.<br><br>
        <span class="highlight">Fai l'ultimo passo:</span> invia l'ordine alla cucina su WhatsApp per far avviare la preparazione!</p>
        
        <button class="btn-whatsapp" onclick="sendFinalWhatsApp()">
            <i class="fa-brands fa-whatsapp fa-xl"></i> AVVISA LA CUCINA
        </button>
    </div>

    <script>
        window.onload = async function() {
            const pendingOrderId = localStorage.getItem('lvb_pending_order');
            if (pendingOrderId) {
                try {
                    await fetch('/webhook', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ order: { orderId: pendingOrderId } })
                    });
                    localStorage.removeItem('lvb_pending_order');
                } catch (e) { console.error("Errore fallback webhook", e); }
            }
        }

        function sendFinalWhatsApp() {
            let orderMessage = localStorage.getItem('peterbun_order_message');
            if (!orderMessage) {
                alert("Non abbiamo trovato i dettagli dell'ordine in memoria. Chiama direttamente il locale per confermare!");
                return;
            }
            let finalMessage = "✅ *ORDINE PAGATO ONLINE (Nexi)*%0A%0A" + orderMessage;
            const phoneNumber = "393342699836"; 
            window.location.href = `https://wa.me/${phoneNumber}?text=${finalMessage}`;
            localStorage.removeItem('peterbun_order_message');
        }
    </script>
</body>
</html>
