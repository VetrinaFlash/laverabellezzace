<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vera Bellezza - Caserta</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-blue: #0b3765; 
            --bg-cream: #f9f4e8; 
            --accent-gold: #c8a14b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            color: var(--brand-blue); 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden; 
            /* Nuovo sfondo appetitoso con overlay scuro */
            background: linear-gradient(rgba(11, 55, 101, 0.7), rgba(11, 55, 101, 0.85)), 
                        url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
        }

        .main-content {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        /* Effetto Glassmorphism per il contenitore centrale */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-emblem {
            display: flex; align-items: center; justify-content: center;
            width: 160px; height: 160px; 
            background-color: #ffffff; 
            border-radius: 50%;
            border: 4px solid var(--accent-gold); 
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(200, 161, 75, 0.3);
            padding: 15px;
            margin-top: -80px; /* Fa uscire il logo dalla card */
        }
        .logo-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        h1 { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 900; color: var(--brand-blue); margin-bottom: 5px; text-transform: uppercase; line-height: 1.1; }
        h2 { font-size: 1rem; font-weight: 600; color: var(--accent-gold); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px;}

        .promo-pill {
            background-color: var(--bg-cream); color: var(--brand-blue);
            padding: 8px 16px; border-radius: 50px; font-weight: 700;
            font-size: 0.85rem; border: 2px dashed var(--accent-gold);
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 30px;
        }

        .btn-main { 
            width: 100%; background: var(--brand-blue); color: #ffffff; border: none; padding: 18px 20px; border-radius: 12px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; text-decoration: none; box-shadow: 0 10px 20px rgba(11, 55, 101, 0.3); font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; 
        }
        .btn-main:active { transform: scale(0.96); }

        .bottom-bar {
            width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .social-icons { display: flex; gap: 20px; }
        .social-icons a {
            color: #ffffff; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s; text-decoration: none;
        }
        .social-icons a:hover { background: var(--accent-gold); color: var(--brand-blue); border-color: var(--accent-gold); }

        .info-line { font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="glass-card">
            <div class="logo-emblem">
                <img src="images/logo.png" alt="La Vera Bellezza" class="logo-img" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Eq_it-na_pizza-margherita_sep2005_sml.jpg/800px-Eq_it-na_pizza-margherita_sep2005_sml.jpg'">
            </div>
            
            <h1>La Vera Bellezza</h1>
            <h2>Trattoria & Pizzeria</h2>

            <div class="promo-pill">
                <i class="fa-solid fa-motorcycle"></i> Delivery & Asporto a Caserta
            </div>

            <a href="menu.html" class="btn-main">
                <i class="fa-solid fa-pizza-slice"></i> Ordina Online Ora
            </a>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="social-icons">
            <a href="#" class="fb"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="ig"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="wa"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
        <div class="info-line"><i class="fa-solid fa-location-dot"></i> Via G. Tescione 164, Caserta</div>
    </div>

</body>
</html>
