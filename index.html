<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vera Bellezza - Caserta</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-blue: #005bb5; 
            --brand-yellow: #ffde00; 
            --bg-light: #ffffff; 
            --text-dark: #1a1a1a;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* IMPEDISCE LO SCORRIMENTO E FISSA L'ALTEZZA */
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--brand-blue); 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; /* Altezza esatta dello schermo visibile su mobile */
            overflow: hidden; /* Blocca completamente lo scroll */
            background-image: radial-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px);
            background-size: 10px 10px;
        }

        /* CONTENITORE CENTRALE */
        .main-content {
            flex: 1; /* Prende tutto lo spazio disponibile al centro */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
        }

        /* EMBLEMA LOGO (Cerchio bianco per logo nero) */
        .logo-emblem {
            display: flex; align-items: center; justify-content: center;
            width: 210px; height: 210px; 
            background-color: #ffffff; 
            border-radius: 50%;
            border: 6px solid var(--brand-yellow); 
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            padding: 20px;
        }
        .logo-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        h1 { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; font-weight: 900; color: #ffffff; margin-bottom: 5px; text-transform: uppercase; line-height: 1.1; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); }
        h2 { font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 600; color: var(--brand-yellow); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px;}

        /* BANDA GIALLA PROMOZIONALE */
        .promo-band {
            background-color: var(--brand-yellow); color: var(--brand-blue);
            width: 120%; padding: 12px 0; font-family: 'Montserrat', sans-serif; font-weight: 900;
            font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2); transform: rotate(-3deg); margin-bottom: 40px;
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
        }
        .promo-band span { display: inline-flex; align-items: center; gap: 6px;}

        /* PULSANTE D'AZIONE */
        .btn-main { background: #ffffff; color: var(--brand-blue); border: none; padding: 18px 35px; border-radius: 50px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; display: inline-flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; text-decoration: none; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; animation: pulse-btn 2.5s infinite; }
        .btn-main:active { transform: scale(0.95); }
        @keyframes pulse-btn { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5); } 70% { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }

        /* BARRA INFERIORE (Fissata in basso) */
        .bottom-bar {
            width: 100%;
            background: #004285;
            padding: 15px 10px 25px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
        }

        /* ICONE SOCIAL GRANDI */
        .social-icons {
            display: flex;
            gap: 25px;
            align-items: center;
        }
        .social-icons a {
            color: #ffffff;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: all 0.2s;
            text-decoration: none;
        }
        .social-icons a:active { transform: scale(0.9); }
        .social-icons a.fb { color: #1877F2; }
        .social-icons a.ig { color: #E1306C; }
        .social-icons a.wa { color: #25D366; }
        .social-icons a:hover { background: #ffffff; }

        .info-line { font-size: 0.85rem; font-weight: 400; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .info-line i { color: var(--brand-yellow); }

        /* Regolazioni automatiche per schermi molto piccoli (es. vecchi iPhone) */
        @media (max-height: 700px) {
            .logo-emblem { width: 160px; height: 160px; margin-bottom: 15px; border-width: 4px; padding: 10px;}
            h1 { font-size: 2.1rem; }
            h2 { margin-bottom: 20px; }
            .promo-band { margin-bottom: 25px; padding: 8px 0; font-size: 0.9rem;}
            .btn-main { padding: 15px 30px; font-size: 1.1rem; }
            .bottom-bar { padding-bottom: 15px; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        
        <div class="logo-emblem">
            <img src="images/logo.png" alt="La Vera Bellezza" class="logo-img">
        </div>
        
        <h1>La Vera Bellezza</h1>
        <h2>Trattoria & Pizzeria</h2>

        <div class="promo-band">
            <span><i class="fa-solid fa-utensils"></i> Promo Pranzo 8€</span>
            <span style="opacity: 0.5;">|</span>
            <span><i class="fa-solid fa-motorcycle"></i> Delivery Caserta</span>
        </div>

        <a href="menu.html" class="btn-main">
            <i class="fa-solid fa-pizza-slice"></i> Ordina Online
        </a>
    </div>

    <div class="bottom-bar">
        
        <div class="social-icons">
            <a href="https://www.facebook.com/p/La-Vera-Bellezza-Trattoria-Pizzeria-100063690666016/" class="fb" target="_blank">
                <i class="fa-brands fa-facebook"></i>
            </a>
            
            <a href="https://www.instagram.com/laverabellezza_ce/" class="ig" target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>
            
            <a href="https://wa.me/393389743948" class="wa" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
        </div>

        <div class="info-line"><i class="fa-solid fa-location-dot"></i> Via G. Tescione 164, Caserta</div>
    </div>

</body>
</html>
