<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vera Bellezza - Menu & Delivery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            var(--brand-blue): #0b3765;
            --brand-blue: #0b3765; 
            --bg-cream: #f9f4e8; 
            --card-bg: #ffffff;
            --text-dark: #0b3765;
            --text-muted: #5a738e;
            --border-color: #d8ceb9;
            --accent-gold: #c8a14b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        button, input, select, textarea {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            outline: none;
            border-radius: 0;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-cream); color: var(--text-dark); padding-bottom: 120px; min-height: 100vh; }

        .checker-border {
            height: 12px;
            width: 100%;
            background: repeating-linear-gradient(
                90deg,
                var(--brand-blue),
                var(--brand-blue) 15px,
                #ffffff 15px,
                #ffffff 30px
            );
        }

        header { position: relative; text-align: center; padding: 25px 20px 30px; background: var(--bg-cream); }
        .header-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .logo-img { max-width: 200px; height: auto; margin-bottom: 15px; }
        
        .restaurant-info { display: inline-block; background: #ffffff; padding: 15px 20px; border-radius: 12px; text-align: left; box-shadow: 0 8px 15px rgba(11, 55, 101, 0.08); border: 1px solid var(--border-color); }
        .info-line { font-size: 0.85rem; color: var(--text-dark); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; font-weight: 600;}
        .info-line:last-child { margin-bottom: 0; }
        .info-line i { color: var(--brand-blue); width: 18px; text-align: center; font-size: 1.1rem;}

        .filters-container { display: flex; overflow-x: auto; gap: 10px; padding: 15px 20px; position: sticky; top: 0; background: rgba(249, 244, 232, 0.95); backdrop-filter: blur(8px); z-index: 100; border-bottom: 2px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .filters-container::-webkit-scrollbar { display: none; }
        .filter-btn { background: #ffffff; color: var(--brand-blue); border: 2px solid var(--brand-blue); padding: 8px 18px; border-radius: 6px; font-weight: 700; font-size: 0.9rem; white-space: nowrap; cursor: pointer; transition: all 0.2s ease; font-family: 'Montserrat', sans-serif; text-transform: uppercase;}
        .filter-btn.active { background: var(--brand-blue); color: #ffffff; box-shadow: 0 4px 10px rgba(11, 55, 101, 0.3); }
        
        .menu-container { padding: 10px 15px; max-width: 900px; margin: 0 auto;}
        .category-section { animation: fadeIn 0.4s ease-in-out; display: block; margin-bottom: 30px;}
        .category-section.hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .category-title { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.6rem; 
            font-weight: 900; 
            color: #ffffff; 
            background: var(--brand-blue);
            display: inline-block;
            padding: 6px 20px;
            transform: skewX(-10deg);
            text-transform: uppercase; 
            margin: 20px 0 15px 5px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
        }
        .category-title-inner { display: inline-block; transform: skewX(10deg); }
        
        /* NUOVO LAYOUT CARDS CON IMMAGINE */
        .menu-item-wrapper {
            background-color: var(--card-bg); 
            border-radius: 16px; 
            margin: 15px 0; 
            box-shadow: 0 4px 15px rgba(11, 55, 101, 0.08); 
            border: 1px solid var(--border-color); 
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .menu-item-row {
            display: flex;
            gap: 15px;
            padding: 12px;
        }

        .item-img-container {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            flex-shrink: 0;
            overflow: hidden;
            background-color: var(--bg-cream);
        }

        .item-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .item-name { font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 800; color: var(--brand-blue); line-height: 1.2; padding-right: 5px; text-transform: uppercase;}
        .item-price { font-size: 1.1rem; font-weight: 800; color: var(--brand-blue); white-space: nowrap; }
        .item-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.3; margin-bottom: 8px; font-weight: 400; flex-grow: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        
        .controls { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
        
        .qty-box { display: flex; align-items: center; gap: 10px; background: var(--bg-cream); padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border-color);}
        
        .btn-control { background: #ffffff; color: var(--brand-blue); border: 2px solid var(--brand-blue); border-radius: 6px; width: 30px; height: 30px; font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;}
        .btn-control:active { background: var(--brand-blue); color: #ffffff; }
        .qty { font-weight: 800; font-size: 1rem; min-width: 22px; text-align: center; color: var(--brand-blue);}

        .btn-custom { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: 'Montserrat', sans-serif; text-transform: uppercase;}
        .btn-custom:active { background: var(--brand-blue); color: #fff; border-color: var(--brand-blue); }
        .custom-section-title { font-family: 'Montserrat', sans-serif; font-weight: 800; color: var(--brand-blue); margin: 20px 0 10px; font-size: 1.1rem; text-transform: uppercase; }
        .custom-checkbox { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.95rem; color: var(--text-dark); background: var(--bg-cream); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-weight: 600;}
        .custom-checkbox input { margin-right: 12px; accent-color: var(--brand-blue); transform: scale(1.4); }
        
        .variants-container { padding: 0 12px; margin-bottom: 12px; }
        .variant-item { background: var(--bg-cream); padding: 12px; border-radius: 8px; margin-top: 5px; border-left: 4px solid var(--accent-gold); border: 1px solid var(--border-color);}
        .variant-desc { font-size: 0.8rem; color: var(--text-dark); margin-bottom: 8px; line-height: 1.4; font-weight: 600;}
        .variant-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; color: var(--brand-blue); font-weight: 800; margin-bottom: 8px;}

        .allergens-box { margin: 40px 15px 20px; padding: 20px; background: var(--card-bg); border: 2px dashed var(--brand-blue); border-radius: 12px; font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; text-align: justify; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
        .allergens-box h4 { color: var(--brand-blue); margin-bottom: 10px; font-size: 1.1rem; text-transform: uppercase; font-family: 'Montserrat', sans-serif; font-weight: 800;}

        .cart-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--brand-blue); padding: 15px 20px 25px; display: flex; justify-content: space-between; align-items: center; border-top: 4px solid var(--accent-gold); transform: translateY(120%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);}
        .cart-footer.visible { transform: translateY(0); }
        .cart-total { font-size: 1.5rem; font-weight: 900; color: #ffffff; font-family: 'Montserrat', sans-serif;}
        .cart-total span { display: block; font-size: 0.8rem; color: var(--accent-gold); text-transform: uppercase; font-family: 'Poppins', sans-serif; letter-spacing: 1px;}
        .btn-checkout { background: var(--bg-cream); color: var(--brand-blue); border: none; padding: 14px 24px; border-radius: 8px; font-weight: 800; font-size: 1rem; display: flex; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); font-family: 'Montserrat', sans-serif; text-transform: uppercase;}

        .checkout-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 55, 101, 0.85); backdrop-filter: blur(5px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .checkout-modal.active { display: flex; }
        .checkout-content { background: var(--bg-cream); border: 4px solid var(--brand-blue); border-radius: 16px; padding: 30px 20px; width: 100%; max-width: 450px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 15px 30px rgba(0,0,0,0.3);}
        .close-modal { position: absolute; top: 15px; right: 20px; color: var(--brand-blue); font-size: 1.8rem; cursor: pointer; }
        .checkout-content h3 { font-family: 'Montserrat', sans-serif; color: var(--brand-blue); margin-bottom: 20px; font-weight: 900; font-size: 1.6rem; text-transform: uppercase; text-align: center;}
        
        .type-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-toggle label { flex: 1; text-align: center; background: #ffffff; padding: 14px 10px; border-radius: 8px; cursor: pointer; border: 2px solid var(--border-color); color: var(--text-muted); font-weight: 700; font-size: 0.95rem; transition: 0.2s;}
        .type-toggle input[type="radio"] { display: none; }
        .type-toggle label.active { background: var(--brand-blue); border-color: var(--brand-blue); color: #ffffff; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.9rem; color: var(--brand-blue); margin-bottom: 8px; font-weight: 700; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px; border-radius: 8px; background: #ffffff; border: 2px solid var(--border-color); color: var(--text-dark); outline: none; font-size: 1rem; font-family: 'Poppins', sans-serif; transition: 0.2s;}
        
        .form-group select {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%230b3765" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 15px center;
            padding-right: 40px;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(11, 55, 101, 0.1);}
        
        .btn-confirm-order { width: 100%; background: var(--brand-blue); color: #ffffff; border: none; padding: 16px; border-radius: 8px; font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; text-transform: uppercase; font-family: 'Montserrat', sans-serif; transition: 0.2s; box-shadow: 0 4px 10px rgba(11, 55, 101, 0.2);}
        .btn-confirm-order:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-confirm-order:active { transform: scale(0.98); }

        @media (min-width: 768px) {
            .filters-container { justify-content: center; flex-wrap: wrap; overflow-x: visible; padding: 20px; }
            .category-section { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .category-title { grid-column: span 2; margin-top: 20px;}
            .menu-item-wrapper { margin: 0; height: 100%; display: flex; flex-direction: column; justify-content: space-between;}
            .allergens-box { grid-column: span 2; margin-top: 40px;}
        }
    </style>
</head>
<body>

    <div class="checker-border"></div>

    <header>
        <div class="header-content">
            <img src="images/logo.png" alt="La Vera Bellezza" class="logo-img" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Eq_it-na_pizza-margherita_sep2005_sml.jpg/800px-Eq_it-na_pizza-margherita_sep2005_sml.jpg'">
            <h2>Pizzeria dall’animo napoletano</h2>
            
            <div class="restaurant-info">
                <div class="info-line"><i class="fa-solid fa-location-dot"></i> Via Gennaro Tescione 164, Caserta</div>
                <div class="info-line"><i class="fa-regular fa-clock"></i> 12:00-15:30 | 19:00-00:00</div>
                <div class="info-line"><i class="fa-solid fa-calendar-xmark"></i> Domenica Chiusi</div>
            </div>
        </div>
    </header>

    <div class="checker-border" style="height: 6px; opacity: 0.5;"></div>

    <div class="filters-container" id="filters-container"></div>
    <div id="menu-container" class="menu-container"></div>

    <div class="cart-footer" id="cart-footer">
        <div class="cart-total"><span>Totale Ordine</span><div id="total-price">0,00 €</div></div>
        <button class="btn-checkout" onclick="openCheckout()"><i class="fa-solid fa-cart-shopping"></i> Paga Ora</button>
    </div>

    <div class="checkout-modal active" id="initial-modal">
        <div class="checkout-content">
            <h3>Benvenuto!</h3>
            <p style="text-align: center; font-size: 0.95rem; color: var(--text-muted); margin-bottom: 25px;">Seleziona come vuoi ricevere l'ordine per visualizzare gli orari disponibili.</p>
            
            <div class="type-toggle">
                <label id="lbl-takeaway" class="active">
                    <input type="radio" name="order-type" value="takeaway" checked onchange="toggleOrderType()">
                    <i class="fa-solid fa-bag-shopping"></i> Asporto
                </label>
                <label id="lbl-delivery">
                    <input type="radio" name="order-type" value="delivery" onchange="toggleOrderType()">
                    <i class="fa-solid fa-motorcycle"></i> Domicilio
                </label>
            </div>

            <div class="form-group">
                <label id="orario-label" for="orario-consegna">Orario di Ritiro *</label>
                <select id="orario-consegna" name="orario" required></select>
            </div>
            
            <button class="btn-confirm-order" onclick="confirmInitialSetup()" id="btn-start-order">
                <i class="fa-solid fa-utensils"></i> Vai al Menù
            </button>
        </div>
    </div>

    <div class="checkout-modal" id="checkout-modal">
        <div class="checkout-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeCheckout()"></i>
            <h3>Completa l'Ordine</h3>
            
            <div id="checkout-summary" style="text-align: center; background: #ffffff; border: 2px dashed var(--brand-blue); padding: 12px; border-radius: 8px; margin-bottom: 10px; color: var(--brand-blue); font-weight: 800; font-size: 1.1rem; text-transform: uppercase;"></div>
            
            <div style="text-align: center; margin-bottom: 25px;">
                <button class="btn-custom" onclick="editInitialSetup()">Modifica Orario/Modalità</button>
            </div>

            <div id="dati-cliente-form">
                <div class="form-group"><label>Nome e Cognome *</label><input type="text" id="cust-name" required></div>
                <div class="form-group"><label>Telefono *</label><input type="tel" id="cust-phone" required></div>

                <div id="delivery-fields" style="display: none;">
                    <div class="form-group">
                        <label>Indirizzo (Via e Civico) *</label>
                        <input type="text" id="cust-address" placeholder="Es. Via Roma 164">
                    </div>
                </div>

                <div class="form-group"><label>Note Aggiuntive</label><textarea id="cust-notes" rows="2" placeholder="Citofono o Note particolari"></textarea></div>
				
                <button class="btn-confirm-order" onclick="sendOrderWithDetails()" id="pay-btn">
                    <i class="fa-regular fa-credit-card"></i> Paga con Nexi
                </button>
            </div>
        </div>
    </div>

    <div class="checkout-modal" id="custom-modal">
        <div class="checkout-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeCustomModal()"></i>
            <h3 id="custom-title" style="font-size: 1.4rem; text-transform: uppercase; margin-bottom: 5px;">Personalizza</h3>
            
            <div class="custom-section-title">Aggiungi (+1.00€)</div>
            <div id="custom-add-list" style="max-height: 180px; overflow-y: auto; margin-bottom: 15px;"></div>
            
            <div class="custom-section-title">Rimuovi (Gratis)</div>
            <div id="custom-remove-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 25px;"></div>
            
            <button class="btn-confirm-order" onclick="addCustomItemToCart()" id="btn-add-custom">
                <i class="fa-solid fa-plus"></i> Conferma a <span id="custom-price-btn"></span>€
            </button>
        </div>
    </div>

        let cart = {};
        let itemMap = {};
        
        const EXTRA_INGREDIENTS = [
            "Patatine fritte", "Salsiccia", "Salame piccante", "Prosciutto Cotto", 
            "Funghi", "Mozzarella di Bufala", "Olive", "Gorgonzola", "Rucola", 
            "Scaglie di Grana", "Pancetta", "Pomodorini", "Doppia Pasta"
        ];
        let currentCustomItemId = null;

        function buildItemMap() {
            menuData.forEach(cat => cat.items.forEach(i => { itemMap[i.id] = i; }));
        }

        function initApp() { 
            buildItemMap();
            renderFilters(); 
            renderMenu(); 
            caricaOrariDisponibili();
        }

        function renderFilters() {
            const filterContainer = document.getElementById('filters-container');
            const btnAll = document.createElement('button'); btnAll.className = 'filter-btn active'; btnAll.innerText = 'Tutti';
            btnAll.onclick = () => filterMenu('all', btnAll); filterContainer.appendChild(btnAll);
            menuData.forEach(cat => {
                const btn = document.createElement('button'); btn.className = 'filter-btn'; btn.innerText = cat.category;
                btn.onclick = () => filterMenu(cat.id, btn); filterContainer.appendChild(btn);
            });
        }

        function filterMenu(categoryId, btnElement) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); btnElement.classList.add('active');
            document.querySelectorAll('.category-section').forEach(section => {
                if (categoryId === 'all' || section.id === `cat-${categoryId}`) section.classList.remove('hidden'); else section.classList.add('hidden');
            });
            window.scrollTo({ top: document.getElementById('filters-container').offsetTop - 20, behavior: 'smooth' });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');

            menuData.forEach(category => {
                const sectionDiv = document.createElement('div'); 
                sectionDiv.className = 'category-section'; 
                sectionDiv.id = `cat-${category.id}`;
                
                sectionDiv.innerHTML = `<div class="category-title"><span class="category-title-inner">${category.category}</span></div>`;
                
                category.items.forEach(item => {
                    let hideCustomBtn = (category.id === 'dolci' || !item.desc || item.desc.trim() === "");
                    let customBtnHtml = hideCustomBtn ? '' : `<button class="btn-custom" onclick="openCustomModal(${item.id})"><i class="fa-solid fa-pen"></i></button>`;
                    
                    let imgHtml = item.image && item.image.trim() !== "" 
                        ? `<img src="${item.image}" loading="lazy" alt="${item.name}">` 
                        : `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background-color: var(--bg-cream); color: var(--text-muted); font-size: 0.75rem; font-weight: 700;">NO FOTO</div>`;

                    sectionDiv.innerHTML += `
                        <div class="menu-item-wrapper">
                            <div class="menu-item-row">
                                <div class="item-img-container">
                                    ${imgHtml}
                                </div>
                                <div class="item-details">
                                    <div class="item-header">
                                        <div class="item-name">${item.name}</div>
                                        <div class="item-price">${item.price.toFixed(2).replace('.',',')}€</div>
                                    </div>
                                    <p class="item-desc">${item.desc}</p>
                                    <div class="controls">
                                        ${customBtnHtml}
                                        <div style="flex-grow: 1;"></div>
                                        <div class="qty-box">
                                            <button class="btn-control" onclick="updateQty('${item.id}', -1)"><i class="fa-solid fa-minus" style="font-size: 0.8rem"></i></button>
                                            <span class="qty" id="qty-${item.id}">0</span>
                                            <button class="btn-control" onclick="updateQty('${item.id}', 1)"><i class="fa-solid fa-plus" style="font-size: 0.8rem"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div id="variants-${item.id}" class="variants-container"></div>
                        </div>`;
                });
                container.appendChild(sectionDiv);
            });
            
            const allergensHTML = `
                <div class="allergens-box">
                    <h4><i class="fa-solid fa-triangle-exclamation"></i> Informazioni su Ingredienti e Allergeni</h4>
                    I piatti contrassegnati con l'asterisco <strong>(*)</strong> sono preparati con materie prime congelate o surgelate all'origine.<br><br>
                    <strong>ATTENZIONE ALLERGIE:</strong> Il nostro menù prevede l'utilizzo di ingredienti quali: <em>Pesce, Uova, Crostacei, Glutine, Arachidi, Latte e derivati, Frutta a guscio, Sedano, Senape, Molluschi, Sesamo, Lupini, Mais, Soia, Funghi e prodotti contenenti Anidride Solforosa / Solfiti.</em><br><br>
                    Se soffri di allergie o intolleranze alimentari, ti preghiamo di comunicarlo espressamente nelle <strong>Note Aggiuntive</strong> in fase di checkout.
                </div>
            `;
            container.innerHTML += allergensHTML;
        }

        // Il resto delle funzioni JS rimane identico (personalizzazioni, calcolo, checkout)
        function openCustomModal(id) {
            currentCustomItemId = id;
            const item = itemMap[id];
            document.getElementById('custom-title').innerText = item.name;
            document.getElementById('custom-price-btn').innerText = item.price.toFixed(2).replace('.',',');
            
            const addContainer = document.getElementById('custom-add-list');
            addContainer.innerHTML = '';
            EXTRA_INGREDIENTS.forEach((ing) => {
                addContainer.innerHTML += `
                    <label class="custom-checkbox">
                        <input type="checkbox" value="${ing}" class="custom-add-chk" onchange="updateCustomPrice()">
                        ${ing}
                    </label>
                `;
            });

            const removeContainer = document.getElementById('custom-remove-list');
            removeContainer.innerHTML = '';
            if(item.desc && item.desc.trim() !== "") {
                let removable = item.desc.split(/,| e | con | \/ /i).map(s => s.trim().replace(/\\.$/, '')).filter(s => s.length > 2);
                removable.forEach((ing) => {
                    removeContainer.innerHTML += `
                        <label class="custom-checkbox">
                            <input type="checkbox" value="${ing}" class="custom-remove-chk">
                            Senza ${ing}
                        </label>
                    `;
                });
            } else {
                removeContainer.innerHTML = '<div style="color:var(--text-muted); font-size:0.85rem; padding: 10px;">Nessun ingrediente rimovibile trovato in descrizione.</div>';
            }
            document.getElementById('custom-modal').classList.add('active');
        }

        function updateCustomPrice() {
            if(!currentCustomItemId) return;
            let basePrice = itemMap[currentCustomItemId].price;
            let addedCount = document.querySelectorAll('.custom-add-chk:checked').length;
            let newPrice = basePrice + (addedCount * 1.00);
            document.getElementById('custom-price-btn').innerText = newPrice.toFixed(2).replace('.',',');
        }

        function closeCustomModal() {
            document.getElementById('custom-modal').classList.remove('active');
            currentCustomItemId = null;
        }

        function addCustomItemToCart() {
            if(!currentCustomItemId) return;
            const baseItem = itemMap[currentCustomItemId];
            
            let added = Array.from(document.querySelectorAll('.custom-add-chk:checked')).map(cb => cb.value);
            let removed = Array.from(document.querySelectorAll('.custom-remove-chk:checked')).map(cb => cb.value);
            
            if (added.length === 0 && removed.length === 0) {
                updateQty(currentCustomItemId, 1);
                closeCustomModal();
                return;
            }

            let newPrice = baseItem.price + (added.length * 1.00);
            let signature = `${currentCustomItemId}|A:${added.sort().join('-')}|R:${removed.sort().join('-')}`;
            
            let hash = 0; 
            for (let i = 0; i < signature.length; i++) hash = Math.imul(31, hash) + signature.charCodeAt(i) | 0;
            let customId = "c_" + currentCustomItemId + "_" + Math.abs(hash);

            if (!itemMap[customId]) {
                itemMap[customId] = { id: customId, baseId: currentCustomItemId, name: baseItem.name, desc: "", price: newPrice, isCustom: true, added: added, removed: removed };
                
                let variantHtml = `
                    <div class="variant-item" id="variant-${customId}">
                        <div class="variant-header">
                            <span>Personalizzata (${newPrice.toFixed(2).replace('.',',')}€)</span>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <button class="btn-control" style="width:26px;height:26px;" onclick="updateQty('${customId}', -1)"><i class="fa-solid fa-minus" style="font-size:0.8rem;"></i></button>
                                <span class="qty" style="font-size:1rem; min-width:20px; color:var(--brand-blue);" id="qty-${customId}">0</span>
                                <button class="btn-control" style="width:26px;height:26px;" onclick="updateQty('${customId}', 1)"><i class="fa-solid fa-plus" style="font-size:0.8rem;"></i></button>
                            </div>
                        </div>
                        <div class="variant-desc">
                            ${added.length ? '<span style="color:#2d8a30;">+ ' + added.join(', ') + '</span><br>' : ''}
                            ${removed.length ? '<span style="color:#d32f2f;">- ' + removed.join(', ') + '</span>' : ''}
                        </div>
                    </div>
                `;
                document.getElementById(`variants-${currentCustomItemId}`).insertAdjacentHTML('beforeend', variantHtml);
            }
            updateQty(customId, 1);
            closeCustomModal();
        }

        function updateQty(itemId, change) {
            if (!cart[itemId]) cart[itemId] = 0; 
            cart[itemId] += change; 
            
            if (cart[itemId] <= 0) {
                cart[itemId] = 0;
                if (itemMap[itemId] && itemMap[itemId].isCustom) { document.getElementById(`variant-${itemId}`).style.display = 'none'; }
            } else {
                if (itemMap[itemId] && itemMap[itemId].isCustom) { document.getElementById(`variant-${itemId}`).style.display = 'block'; }
            }
            
            let qtySpan = document.getElementById(`qty-${itemId}`);
            if(qtySpan) qtySpan.innerText = cart[itemId]; 
            
            updateCartUI();
        }

        function updateCartUI() {
            let total = 0, totalItems = 0;
            for(let id in cart) {
                if (cart[id] > 0 && itemMap[id]) {
                    total += itemMap[id].price * cart[id]; 
                    totalItems += cart[id];
                }
            }
            document.getElementById('total-price').innerText = total.toFixed(2).replace('.',',') + ' €';
            const footer = document.getElementById('cart-footer');
            if (totalItems > 0) footer.classList.add('visible'); else footer.classList.remove('visible');
        }

        function getTodayString() {
            const dateObj = new Date();
            return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
        }

        async function caricaOrariDisponibili() {
            const select = document.getElementById('orario-consegna');
            const payBtn = document.getElementById('btn-start-order');
            
            const typeNode = document.querySelector('input[name="order-type"]:checked');
            const type = typeNode ? typeNode.value : 'takeaway';
            const todayStr = getTodayString();
            
            select.innerHTML = '<option value="">Controllo disponibilità in corso...</option>';
            payBtn.disabled = true;

            try {
                const response = await fetch(`/orari?tipo=${type}&data=${todayStr}&nocache=${new Date().getTime()}`);
                const data = await response.json();
                
                if(data.success) {
                    select.innerHTML = '';
                    const now = new Date();
                    const currentHour = now.getHours();
                    const currentMinute = now.getMinutes();
                    
                    const minTimeInMinutes = (currentHour * 60) + currentMinute + 20;
                    let slotAggiunti = 0;

                    data.orari.forEach(timeStr => {
                        const [hh, mm] = timeStr.split(':');
                        const slotTimeInMinutes = (parseInt(hh) * 60) + parseInt(mm);
                        
                        if (slotTimeInMinutes >= minTimeInMinutes || currentHour < 19) {
                            select.innerHTML += `<option value="${timeStr}">${timeStr}</option>`;
                            slotAggiunti++;
                        }
                    });

                    if (slotAggiunti === 0) {
                        select.innerHTML = `<option value="">Nessun orario disponibile per oggi</option>`;
                        payBtn.disabled = true;
                    } else {
                        payBtn.disabled = false;
                    }
                }
            } catch (err) {
                select.innerHTML = `<option value="">Errore di connessione</option>`;
            }
        }

        function toggleOrderType() {
            const type = document.querySelector('input[name="order-type"]:checked').value;
            const labelOrario = document.getElementById('orario-label');
            
            if(type === 'takeaway') {
                document.getElementById('lbl-takeaway').classList.add('active');
                document.getElementById('lbl-delivery').classList.remove('active');
                labelOrario.innerText = "Orario di Ritiro *";
            } else {
                document.getElementById('lbl-takeaway').classList.remove('active');
                document.getElementById('lbl-delivery').classList.add('active');
                labelOrario.innerText = "Orario di Consegna *";
            }
            caricaOrariDisponibili();
        }

        function confirmInitialSetup() {
            const orario = document.getElementById('orario-consegna').value;
            if (!orario) { alert("Spiacenti, non ci sono orari disponibili. Riprova più tardi."); return; }
            document.getElementById('initial-modal').classList.remove('active');
        }

        function editInitialSetup() {
            document.getElementById('checkout-modal').classList.remove('active');
            document.getElementById('initial-modal').classList.add('active');
            caricaOrariDisponibili();
        }

        function openCheckout() { 
            const type = document.querySelector('input[name="order-type"]:checked').value;
            const orario = document.getElementById('orario-consegna').value;
            
            const summaryDiv = document.getElementById('checkout-summary');
            if (type === 'delivery') {
                document.getElementById('delivery-fields').style.display = 'block';
                summaryDiv.innerHTML = `<i class="fa-solid fa-motorcycle"></i> Consegna a Domicilio<br><span style="font-size:0.9rem; color:var(--text-muted); font-weight:600;">Ore ${orario}</span>`;
            } else {
                document.getElementById('delivery-fields').style.display = 'none';
                summaryDiv.innerHTML = `<i class="fa-solid fa-bag-shopping"></i> Ritiro al Locale<br><span style="font-size:0.9rem; color:var(--text-muted); font-weight:600;">Ore ${orario}</span>`;
            }
            document.getElementById('checkout-modal').classList.add('active'); 
        }

        function closeCheckout() { document.getElementById('checkout-modal').classList.remove('active'); }

        async function sendOrderWithDetails() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const orderType = document.querySelector('input[name="order-type"]:checked').value;
            const notes = document.getElementById('cust-notes').value.trim();
            const orario = document.getElementById('orario-consegna').value;

            if(!name || !phone) { alert("Compila Nome e Telefono per continuare!"); return; }

            let deliveryInfo = "";
            if (orderType === 'delivery') {
                const address = document.getElementById('cust-address').value.trim();
                if(!address) { alert("Inserisci l'indirizzo di consegna."); return; }
                deliveryInfo = `*Consegna a Domicilio*\nIndirizzo: ${address}\nOrario Richiesto: ${orario}`;
            } else {
                deliveryInfo = `*Ritiro al Locale*\nOrario Richiesto: ${orario}`;
            }

            const cleanName = name.replace(/\s+/g, '').toUpperCase(); 
            const firstLetter = cleanName.charAt(0) || 'L';
            const lastLetter = cleanName.charAt(cleanName.length - 1) || 'B';
            const randomNum = Math.floor(10000 + Math.random() * 90000);
            
            const orderId = `LVB-${firstLetter}${lastLetter}-${randomNum}_${orderType}_${orario}`;
            const todayStr = getTodayString();

            let total = 0; 
            let text = `*NUOVO ORDINE PAGATO CON NEXI!*\nID Rif: ${orderId}\n\nCliente: ${name}\nTelefono: ${phone}\n${deliveryInfo}\n`;
            if(notes) text += `Note: ${notes}\n`; 
            text += `\n*RIEPILOGO ORDINE:*\n`;

            for(let id in cart) {
                if (cart[id] > 0 && itemMap[id]) {
                    let item = itemMap[id];
                    const lineTotal = item.price * cart[id]; 
                    total += lineTotal;
                    
                    let customTesto = "";
                    if(item.isCustom) {
                        if(item.added.length > 0) customTesto += `\n   -> Con: ${item.added.join(', ')}`;
                        if(item.removed.length > 0) customTesto += `\n   -> Senza: ${item.removed.join(', ')}`;
                    }
                    
                    text += `- ${cart[id]}x ${item.name} (${lineTotal.toFixed(2)} Euro)${customTesto}\n`;
                }
            }

            if (total < 1.00) { alert("L'ordine minimo è 1.00 Euro!"); return; }
            text += `\n*TOTALE PAGATO: ${total.toFixed(2)} Euro*\n`;
            
            localStorage.removeItem('lvb_order_message');
            localStorage.setItem('lvb_order_message', text);
            localStorage.setItem('lvb_pending_order', orderId); 
            
            const btn = document.getElementById('pay-btn');
            btn.innerHTML = 'Controllo Slot...'; 
            btn.disabled = true;

            const WORKER_URL = "/paga"; 

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId: orderId, totalAmount: total, orarioSelezionato: orario, dataOrdine: todayStr, tipoOrdine: orderType })
                });
                
                const data = await response.json();
                
                if (data.success && data.redirectUrl) { 
                    window.location.href = data.redirectUrl;
                } else { 
                    alert("ATTENZIONE: " + data.error); 
                    btn.innerHTML = 'Paga con Nexi'; 
                    btn.disabled = false; 
                }
            } catch (error) {
                alert("Errore di connessione. Riprova tra poco."); 
                btn.innerHTML = 'Paga con Nexi'; 
                btn.disabled = false;
            }
        }

        window.onload = initApp;
    </script>
