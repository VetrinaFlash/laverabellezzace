<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pagamento Annullato - La Vera Bellezza</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { background-color: #005bb5; color: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
        
        .card { background: #ffffff; padding: 40px 25px; border-radius: 24px; border-bottom: 8px solid #ffde00; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 400px; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .logo-img { max-width: 180px; height: auto; margin: 0 auto 20px; display: block; }

        .icon-circle { width: 80px; height: 80px; background: #ffebee; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; border: 3px solid #F44336; }
        .icon-circle i { font-size: 2.5rem; color: #F44336; }
        
        h1 { font-family: 'Montserrat', sans-serif; font-size: 1.7rem; color: #005bb5; margin-bottom: 15px; font-weight: 900; line-height: 1.2; text-transform: uppercase;}
        p { font-size: 1rem; color: #555; margin-bottom: 30px; line-height: 1.6; }
        
        .btn-back { background: #ffde00; color: #005bb5; border: none; padding: 18px 20px; border-radius: 50px; font-size: 1.1rem; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; text-decoration: none; box-shadow: 0 8px 20px rgba(255, 222, 0, 0.4); transition: transform 0.2s; font-family: 'Montserrat', sans-serif; text-transform: uppercase;}
        .btn-back:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="card">
        <img src="images/logo.png" alt="La Vera Bellezza" class="logo-img">
        <div class="icon-circle">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <h1>Pagamento Annullato</h1>
        <p>Nessun addebito è stato effettuato sulla tua carta. L'operazione è stata interrotta.</p>
        
        <a href="index.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> TORNA AL MENÙ
        </a>
    </div>

</body>
</html>
